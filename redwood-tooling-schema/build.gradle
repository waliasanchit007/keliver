import static dev.konduit.buildsupport.TargetGroup.Tooling

redwoodBuild {
  targets(Tooling)
  publishing()
  cliApplication('redwood-schema', 'dev.konduit.tooling.schema.Main')
}

apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'java-test-fixtures'

dependencies {
  api projects.redwoodSchema
  api libs.kotlin.reflect
  implementation libs.kotlinx.serialization.json
  implementation libs.xmlutil.serialization
  implementation libs.kotlin.compilerEmbeddable
  implementation libs.clikt

  testImplementation projects.redwoodUiBasicSchema
  testImplementation libs.junit
  testImplementation libs.assertk
  testImplementation libs.jimfs
}

tasks.named('test', Test) {
  // We create a lot of instances of the Kotlin frontend. Throw memory + forks at it to avoid OOM.
  maxHeapSize = '3g'
  forkEvery = 1
}
