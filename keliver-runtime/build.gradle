import dev.keliver.buildsupport.WasmJs
import static dev.keliver.buildsupport.TargetGroup.CommonWithAndroid

redwoodBuild {
  targets(CommonWithAndroid + WasmJs.Browser)
  publishing()
}

apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'dev.drewhamilton.poko'

kotlin {
  // Share the identical js/wasmJs actuals from a single webMain source set.
  applyDefaultHierarchyTemplate {
    it.group("common") {
      it.group("web") {
        it.withJs()
        it.withWasmJs()
      }
    }
  }

  sourceSets {
    commonMain {
      dependencies {
        implementation libs.jetbrains.compose.runtime
        implementation libs.kotlinx.serialization.core
      }
    }
    commonTest {
      dependencies {
        implementation libs.kotlin.test
        implementation libs.assertk
      }
    }
  }
}

android {
  namespace 'dev.keliver.runtime'
}

spotless {
  kotlin {
    targetExclude(
      // Apache 2-licensed files from AOSP.
      "src/commonMain/kotlin/dev/keliver/Modifier.kt",
    )
  }
}
