import static dev.keliver.buildsupport.TargetGroup.Tooling

redwoodBuild {
  targets(Tooling)
  publishing()
  cliApplication('konduit-schema', 'dev.keliver.tooling.schema.Main')
}

apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'java-test-fixtures'

dependencies {
  api projects.konduitSchema
  api libs.kotlin.reflect
  implementation libs.kotlinx.serialization.json
  implementation libs.xmlutil.serialization
  implementation libs.kotlin.compilerEmbeddable
  implementation libs.clikt

  testImplementation projects.konduitUiBasicSchema
  testImplementation libs.junit
  testImplementation libs.assertk
  testImplementation libs.jimfs
  // For the @Composable annotation used in the schema-parser-FIR
  // rejection test (#31). Test-only — production parsing reads the
  // annotation's fully-qualified name and doesn't need the symbol.
  testImplementation libs.jetbrains.compose.runtime
}

tasks.named('test', Test) {
  // We create a lot of instances of the Kotlin frontend. Throw memory + forks at it to avoid OOM.
  maxHeapSize = '3g'
  forkEvery = 1
}
