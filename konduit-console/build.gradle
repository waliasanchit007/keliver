// Host-bound logging service — KonduitConsole interface + a
// no-frills DefaultKonduitConsole using `println`. Lets every adopter
// drop a `class FooHostConsole : ZiplineService { fun log(...) }`
// copy/paste. See issue #27.

import static dev.konduit.buildsupport.TargetGroup.Common

redwoodBuild {
  targets(Common)
  publishing()
}

apply plugin: 'app.cash.zipline'

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        api libs.zipline
      }
    }
    commonTest {
      dependencies {
        implementation libs.kotlin.test
      }
    }
  }
}
