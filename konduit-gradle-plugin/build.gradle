import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile

apply plugin: 'org.jetbrains.kotlin.jvm'
apply plugin: 'java-gradle-plugin'
apply plugin: 'com.github.gmazzo.buildconfig'
apply plugin: 'com.android.lint'

// This module is included in two projects:
// - In the root project where it's released as one of our artifacts
// - In build-support project where we can use it for the test-app and samples.
//
// We only want to publish when it's being built in the root project.
if (rootProject.name == 'konduit') {
  redwoodBuild {
    publishing()
  }
} else {
  // Move the build directory when included in build-support so as to not poison the real build.
  // If we don't there's a chance incorrect build config values (configured below) will be used.
  layout.buildDirectory = new File(rootDir, "build/konduit-gradle-plugin")
}

tasks.withType(JavaCompile).configureEach {
  sourceCompatibility = JavaVersion.VERSION_11.toString()
  targetCompatibility = JavaVersion.VERSION_11.toString()
}

tasks.withType(KotlinJvmCompile).configureEach {
  compilerOptions {
    jvmTarget.set(JvmTarget.JVM_11)
  }
}

dependencies {
  compileOnly gradleApi()
  compileOnly libs.kotlin.gradlePlugin
  compileOnly libs.androidGradlePlugin

  testImplementation libs.junit
  testImplementation libs.assertk
  testImplementation gradleTestKit()

  lintChecks libs.androidx.gradlePluginLints
}

gradlePlugin {
  plugins {
    redwoodLint {
      id = "dev.konduit.lint"
      displayName = "Redwood lint"
      description = "Redwood lint Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodLintPlugin"
    }
    ziplineShapes {
      id = "dev.konduit.zipline-shapes"
      displayName = "Konduit ZiplineService shape lint"
      description = "Reject ZiplineService methods with function-typed parameters (KNOWN_BUGS U11)"
      implementationClass = "dev.konduit.gradle.ZiplineShapesPlugin"
    }
    redwoodSchema {
      id = "dev.konduit.schema"
      displayName = "Redwood schema"
      description = "Redwood Schema Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodSchemaPlugin"
    }
    redwoodComposeGenerator {
      id = "dev.konduit.generator.compose"
      displayName = "Redwood generator (Compose)"
      description = "Redwood schema Compose code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodComposeGeneratorPlugin"
    }
    redwoodComposeProtocolGenerator {
      id = "dev.konduit.generator.compose.protocol"
      displayName = "Redwood generator (Compose protocol)"
      description = "Redwood schema Compose protocol code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodComposeProtocolGeneratorPlugin"
    }
    redwoodModifierGeneratorPlugin {
      id = "dev.konduit.generator.modifiers"
      displayName = "Redwood generator (layout modifiers)"
      description = "Redwood schema layout modifier code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodModifiersGeneratorPlugin"
    }
    redwoodProtocolGuestGenerator {
      id = "dev.konduit.generator.protocol.guest"
      displayName = "Redwood generator (guest protocol)"
      description = "Redwood schema guest protocol code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodProtocolGuestGeneratorPlugin"
    }
    redwoodProtocolHostGenerator {
      id = "dev.konduit.generator.protocol.host"
      displayName = "Redwood generator (host protocol)"
      description = "Redwood schema host protocol code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodProtocolHostGeneratorPlugin"
    }
    redwoodTestingGenerator {
      id = "dev.konduit.generator.testing"
      displayName = "Redwood generator (testing)"
      description = "Redwood schema testing code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodTestingGeneratorPlugin"
    }
    redwoodWidgetGenerator {
      id = "dev.konduit.generator.widget"
      displayName = "Redwood generator (widget)"
      description = "Redwood schema widget code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodWidgetGeneratorPlugin"
    }
    redwoodWidgetProtocolGenerator {
      id = "dev.konduit.generator.widget.protocol"
      displayName = "Redwood generator (widget protocol)"
      description = "Redwood schema widget protocol code generation Gradle plugin"
      implementationClass = "dev.konduit.gradle.RedwoodWidgetProtocolGeneratorPlugin"
    }
  }
}

test {
  dependsOn(':konduit-compose:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-gradle-plugin:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-leak-detector:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-protocol:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-protocol-guest:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-protocol-host:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-runtime:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-schema:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-tooling-codegen:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-tooling-lint:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-tooling-schema:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-widget:publishAllPublicationsToLocalMavenRepository')
  dependsOn(':konduit-widget-composeui:publishAllPublicationsToLocalMavenRepository')

  inputs.dir(project.file('src/test/fixture'))
}

buildConfig {
  useKotlinOutput {
    internalVisibility = true
    topLevelConstants = true
  }

  packageName('dev.konduit.gradle')
  buildConfigField("String", "redwoodVersion", "\"${project.version}\"")
  buildConfigField("String", "androidxCollectionCoordinates", "\"${libs.jetbrains.compose.collection.get()}\"")
}
