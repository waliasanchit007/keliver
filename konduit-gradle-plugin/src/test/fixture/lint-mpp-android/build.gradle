buildscript {
  dependencies {
    classpath "dev.keliver:konduit-gradle-plugin:$redwoodVersion"
    classpath libs.kotlin.gradlePlugin
    classpath libs.androidGradlePlugin
  }

  repositories {
    maven {
      url "file://${rootDir.absolutePath}/../../../../../build/localMaven"
    }
    mavenCentral()
    google()
  }
}

apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'com.android.library'
apply plugin: 'dev.keliver.lint'

kotlin {
  androidTarget()
  jvm()
}

android {
  namespace 'example.android'
  compileSdk 33
}

repositories {
  maven {
    url "file://${rootDir.absolutePath}/../../../../../build/localMaven"
  }
  mavenCentral()
  google()
}
