import static dev.keliver.buildsupport.TargetGroup.ToolkitAllWithoutAndroid

redwoodBuild {
  targets(ToolkitAllWithoutAndroid)
  sharedSnapshotTests()
}

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        api projects.konduitLazylayoutApi
        api projects.konduitLazylayoutWidget
        api projects.konduitSnapshotTesting
        api projects.konduitRuntime
        api projects.konduitWidget
        api projects.konduitYoga
        api libs.kotlin.test
      }
    }
    jvmMain {
      dependencies {
        // The kotlin.test library provides JVM variants for multiple testing frameworks. When used
