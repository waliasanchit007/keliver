import dev.konduit.buildsupport.JsTests

import static dev.konduit.buildsupport.TargetGroup.CommonWithAndroid

redwoodBuild {
  targets(CommonWithAndroid + JsTests.Browser)
  publishing()
}

apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'app.cash.burst'

kotlin {
  applyDefaultHierarchyTemplate {
    it.group("common") {
      it.group("nonJs") {
        it.group("ios") {}
        it.withAndroidTarget()
        it.withJvm()
      }
    }
  }

  sourceSets {
    commonMain {
      dependencies {
        api libs.kotlinx.coroutines.core
        api projects.konduitRuntime
        api projects.konduitWidget
        api libs.jetbrains.compose.runtime
        api libs.jetbrains.compose.runtime.saveable
      }
    }
    commonTest {
      // testapp-fixture-dependent tests are opt-in — see U13 / the
      // matching comment in konduit-protocol-host/build.gradle.
      if (rootProject.hasProperty('konduitWithTestApp')) {
        kotlin.srcDir('src/appsCommonTest/kotlin')
      }
      dependencies {
        implementation libs.kotlin.test
        implementation libs.kotlinx.coroutines.test
        implementation libs.assertk
        implementation projects.konduitUiBasicCompose
        implementation projects.konduitUiBasicTesting
      }
    }
    androidMain {
      dependencies {
        implementation libs.androidx.core
      }
    }
    nonJsMain {
      kotlin.srcDir(redwoodBuild.generateComposeHelpers(tasks, 'dev.konduit.compose'))
      dependencies {
        implementation libs.jetbrains.compose.collection
      }
    }
  }
}

dependencies {
  androidTestImplementation libs.junit
  androidTestImplementation libs.androidx.test.runner
  androidTestImplementation libs.kotlinx.coroutines.test
  androidTestImplementation libs.assertk
}

android {
  namespace 'dev.konduit.compose'

  defaultConfig {
    testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
  }

  testOptions {
    unitTests.returnDefaultValues = true
  }
}

spotless {
  kotlin {
    targetExclude(
      // Apache 2-licensed files from AOSP.
      "src/androidMain/kotlin/dev/konduit/compose/AndroidUiDispatcher.kt",
      "src/androidMain/kotlin/dev/konduit/compose/AndroidUiFrameClock.kt",
    )
  }
}
