// spike/keliver-web: a Compose-for-Web (JS canvas) app that renders keliver-material
// widgets in a browser using the SAME renderer code as Android/iOS — proving
// "one Kotlin codebase → web + Android + iOS". Not published; spike only.
apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'org.jetbrains.compose'

kotlin {
  wasmJs {
    browser {
      commonWebpackConfig {
        outputFileName = 'web-spike.js'
      }
    }
    binaries.executable()
  }
  sourceSets {
    wasmJsMain {
      dependencies {
        // GATE 3: a GENERIC host — only the protocol-host + ComposeUi renderers.
        // NO guest-screen modules: the UI is fetched from screen.json at runtime.
        implementation project(':keliver-material-composeui')  // host renderers + widget system
        implementation project(':web-spike-protocol-host')     // KeliverMaterialHostProtocol
        implementation project(':keliver-protocol')            // SnapshotChangeList (wire format)
        implementation project(':keliver-protocol-guest')      // guestRedwoodVersion (constant only)
        implementation project(':keliver-protocol-host')       // HostProtocolAdapter + UiChange
        implementation project(':keliver-widget-composeui')    // ComposeWidgetChildren (host root)
        implementation project(':keliver-leak-detector')       // LeakDetector.none()
        implementation project(':keliver-runtime')
        implementation libs.kotlinx.serialization.json
        implementation libs.jetbrains.compose.runtime
        implementation libs.jetbrains.compose.foundation
        implementation libs.jetbrains.compose.ui
        implementation libs.jetbrains.compose.material3
        implementation libs.coil.compose                       // ImageLoader for the widget system
      }
    }
  }
}
