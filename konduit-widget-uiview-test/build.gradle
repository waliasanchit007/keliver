import static dev.konduit.buildsupport.TargetGroup.ToolkitIos
import static org.jetbrains.kotlin.gradle.plugin.KotlinPlatformType.common

redwoodBuild {
  targets(ToolkitIos)
}

kotlin {
  targets.configureEach { target ->
    if (target.platformType != common) {
      target.binaries.framework {
        compilation = target.compilations.test
        baseName = 'RedwoodWidgetUIViewTestKt'
      }
    }
  }

  sourceSets {
    commonMain {
      dependencies {
        api projects.konduitLayoutWidget
        implementation projects.konduitWidgetSharedTest
        implementation projects.konduitYoga
      }
    }
    commonTest {
      dependencies {
        api projects.konduitLayoutSharedTest
        api projects.konduitSnapshotTesting
        api libs.kotlin.test
        implementation libs.assertk
      }
    }
  }
}

// Tests are consumed by Swift/XCode.
tasks.withType(AbstractTestTask).configureEach {
  failOnNoDiscoveredTests = false
}
