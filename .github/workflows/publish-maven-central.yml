name: Publish to Maven Central

# Publishes Keliver artifacts to Maven Central (Sonatype Central Portal)
# under the GitHub-vanity namespace `io.github.waliasanchit007`.
#
# This is intentionally MANUAL-ONLY (workflow_dispatch). It is gated on
# four repo secrets that only the maintainer can provision — see
# docs/MAVEN_CENTRAL_SETUP.md Steps 1-3:
#   SONATYPE_USERNAME / SONATYPE_PASSWORD  (Central Portal user token)
#   SIGNING_KEY / SIGNING_PASSWORD         (armored GPG private key + passphrase)
# Until those exist, running this workflow fails fast at the preflight
# guard with a legible message rather than a confusing Gradle error.
#
# It is deliberately SEPARATE from publish.yml (which pushes to GitHub
# Packages on every `v*` tag). Keeping them apart means the existing
# private-consumer flow (`dev.keliver:*`) is never blocked on Central
# credentials, and the two channels can co-exist during migration.
#
# Coordinates: the `-PkeliverGroupId=io.github.waliasanchit007` override
# flips the Gradle group for this build only; published Kotlin package
# names stay `dev.keliver.*`. The version comes from
# build-support/RedwoodBuildPlugin.kt's KELIVER_VERSION — bump it before
# releasing. Note: `*-SNAPSHOT` versions route to the Central snapshots
# repository, not the main index.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit to publish (use a release tag for canonical releases)"
        required: true

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Dkotlin.incremental=false"
  KELIVER_GROUP_ID: io.github.waliasanchit007

jobs:
  publish:
    name: Publish to Maven Central
    # macOS needed to publish iOS klibs. Falls back to cloud `macos-latest`
    # if no `CI_RUNNER` repo variable is set.
    runs-on: ${{ vars.CI_RUNNER || 'macos-latest' }}
    permissions:
      contents: read

    steps:
      # Fail fast with a legible message if the maintainer hasn't yet
      # provisioned the Sonatype + signing secrets (Setup doc Steps 1-3).
      - name: Preflight — verify publishing secrets exist
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          missing=""
          [ -z "$SONATYPE_USERNAME" ] && missing="$missing SONATYPE_USERNAME"
          [ -z "$SONATYPE_PASSWORD" ] && missing="$missing SONATYPE_PASSWORD"
          [ -z "$SIGNING_KEY" ]       && missing="$missing SIGNING_KEY"
          [ -z "$SIGNING_PASSWORD" ]  && missing="$missing SIGNING_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing — see docs/MAVEN_CENTRAL_SETUP.md Steps 1-3."
            exit 1
          fi
          echo "All four publishing secrets are present."

      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ inputs.ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: .github/workflows/.java-version
      - uses: gradle/actions/setup-gradle@v4

      # Sanity check: if publishing from a `v*` tag, ensure it matches the
      # build's KELIVER_VERSION (same guard as publish.yml).
      - name: Verify tag matches build version
        if: startsWith(inputs.ref, 'v')
        run: |
          tag_version="${{ inputs.ref }}"
          tag_version="${tag_version#v}"
          build_version=$(grep 'KELIVER_VERSION' build-support/src/main/kotlin/dev/keliver/buildsupport/RedwoodBuildPlugin.kt | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Tag version:   $tag_version"
          echo "Build version: $build_version"
          if [ "$tag_version" != "$build_version" ]; then
            echo "::error::Tag $tag_version doesn't match KELIVER_VERSION $build_version. Bump the constant before tagging."
            exit 1
          fi

      - name: Publish to Maven Central
        # `publishToMavenCentral` uploads a single deployment bundle for all
        # modules; the build sets automaticRelease=true so it also releases.
        # Signing is on (RELEASE_SIGNING_ENABLED defaults to true) — Central
        # rejects unsigned artifacts.
        run: >
          ./gradlew
          publishToMavenCentral
          -PkeliverGroupId=${{ env.KELIVER_GROUP_ID }}
          -x test
        env:
          # vanniktech maven-publish reads these project properties (Gradle
          # auto-maps ORG_GRADLE_PROJECT_X -> project property X).
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
