name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags-ignore: ['**']
  workflow_dispatch: {}

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false -Dkotlin.incremental=false"

# Cancel older runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single full-graph validator on macOS (covers JVM/Android/JS/iOS).
  # Why no Linux: cheap-PR Linux runs hung at 58m on the cache restore step,
  # consistently. macOS already builds everything; one source of truth is
  # cheaper to maintain than a flaky two-runner setup.
  #
  # Runner selection is configurable via the `CI_RUNNER` repo variable
  # (Settings → Secrets and variables → Actions → Variables). Set it to
  # `self-hosted` to route runs to a self-hosted Mac and bypass GitHub
  # Actions billing — see docs/CI_RUNNER_SETUP.md. Default is `macos-latest`
  # (cloud) so the workflow keeps working on forks / contributor PRs.
  build:
    name: Build (full graph, incl. iOS)
    runs-on: ${{ vars.CI_RUNNER || 'macos-latest' }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version-file: .github/workflows/.java-version
      - uses: gradle/actions/setup-gradle@v4

      - name: Build + publishToMavenLocal (no signing)
        run: >
          ./gradlew
          publishToMavenLocal
          -x test
          -x allTests
          -DRELEASE_SIGNING_ENABLED=false

      # Enforce the test suite + API binary-compatibility surface.
      # Previously skipped (-x test), which let a stripped test
      # fixture rot the suite undetected — see docs/KNOWN_BUGS.md U13.
      # `apiCheck` guards the published API against accidental drift;
      # the per-module `.api` baselines under `*/api/` are the source
      # of truth (regenerate with `./gradlew apiDump` when you
      # intentionally change public API).
      #
      # ANDROID_HOME is pre-set on GitHub macOS runners; the gradle-
      # plugin lint fixtures (FixtureTest > lintMpp*) spin up a
      # sub-build with an Android module and need it.
      - name: Test + API check
        run: >
          ./gradlew
          test
          apiCheck
          -DRELEASE_SIGNING_ENABLED=false

      # The full inherited Redwood test suite that asserts against the
      # recovered `test-app` fixture (gated behind -PkeliverWithTestApp;
      # see docs/KNOWN_BUGS.md U13). Both halves now run:
      #   - schema/codegen tests (protocol-host/-guest, testing, compose,
      #     tooling-codegen)
      #   - treehouse-host integration tests that load a live Zipline
      #     guest bundle via TreehouseTester (presenter-treehouse)
      #   - the guest-side jsTest
      # Targeted test tasks (not the `test` aggregate) so we don't trip
      # `kotlinStoreYarnLock` on the gated JS modules.
      - name: Test (recovered test-app fixture)
        run: >
          ./gradlew
          -PkeliverWithTestApp
          :keliver-protocol-host:jvmTest
          :keliver-protocol-guest:jvmTest
          :keliver-testing:jvmTest
          :keliver-compose:jvmTest
          :keliver-tooling-codegen:test
          :keliver-treehouse-host:jvmTest
          :keliver-treehouse-guest:jsTest
          -DRELEASE_SIGNING_ENABLED=false
