// spike/keliver-web portal M2 Option X — the on-device Treehouse GUEST (Kotlin/JS,
// Zipline bundle). Renders the portal's keliver-material WidgetNode tree faithfully:
// Show() polls the host (HostApi.httpCall of the relay) -> deserializeTree -> RenderNode.
// Template: test-app/presenter-treehouse.
apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'app.cash.zipline'

redwoodBuild {
  ziplineApplication('portal-device')
}

kotlin {
  jvm() // lets the android host consume the HostApi / PortalPresenter interfaces
  iosArm64() // P5: the iOS host consumes the same interfaces
  iosSimulatorArm64()
  js {
    outputModuleName = 'portal-device-guest'
    browser()
    binaries.executable()
  }

  sourceSets {
    commonMain {
      dependencies {
        api projects.keliverTreehouse
        api libs.zipline
      }
    }
    jsMain {
      dependencies {
        api projects.keliverTreehouseGuest
        implementation projects.webSpikeProtocolGuest   // KeliverMaterialProtocolWidgetSystemFactory
        implementation projects.keliverMaterialCompose   // StyledBox/StyledText/Button/AsyncImage
        implementation projects.keliverLayoutCompose      // Column/Row/Spacer
        implementation projects.portalCore                // WidgetNode + deserializeTree
        implementation projects.portalRender              // GENERATED RenderNode interpreter (P1)
        implementation projects.portalAppLib              // M9: the COMPILED screens (overlay-router primary)
        implementation projects.portalSql                 // M9: HostSqlDriver for the compiled path
        implementation libs.jetbrains.compose.runtime
        implementation libs.kotlinx.coroutines.core
      }
    }
  }
}
