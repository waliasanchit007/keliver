import static dev.konduit.buildsupport.TargetGroup.Common

redwoodBuild {
  targets(Common)
  publishing()
}

apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'dev.konduit.generator.compose'

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        api(projects.redwoodUiBasicWidget)
        api(projects.redwoodLayoutCompose)
        api(projects.redwoodLazylayoutCompose)
      }
    }
  }
}

redwoodSchema {
  source = projects.redwoodUiBasicSchema
  type = 'dev.konduit.ui.basic.RedwoodUiBasic'
}
