    commonMain {
      dependencies {
        api projects.redwoodUiBasicApi
        api projects.redwoodUiBasicModifiers
        api projects.redwoodLayoutWidget
        api projects.redwoodLazylayoutWidget
      }
    }
  }
}

redwoodSchema {
