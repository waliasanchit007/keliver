// spike/keliver-web portal P4 — the PUBLISHED guest template. The publish step
// (portal-server POST /publish) writes generated/PublishedScreen.kt +
// PublishedEntry.kt into this module, compiles it to a .zipline bundle, and
// SIGNS the manifest with the portal's Ed25519 key (~/.keliver-portal/keys).
// Engineers own src/jsMain/kotlin/impl/ (bindings impls) — the round-trip
// boundary enforced at compile time. Service names match portal-device-guest,
// so the SAME host app loads either bundle (dev interpreter vs published).
apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'app.cash.zipline'

redwoodBuild {
  ziplineApplication('portal-published')
}

// Sign with the portal's key when it exists (generated by portal-server at
// first boot). Absent key (fresh checkout / CI) -> unsigned dev bundle.
def portalKey = new File(System.getProperty('user.home'), '.keliver-portal/keys/ed25519.priv')
if (portalKey.exists()) {
  zipline {
    signingKeys {
      create('portal-ed25519') {
        algorithmId.set(app.cash.zipline.loader.SignatureAlgorithmId.Ed25519)
        privateKeyHex.set(portalKey.text.trim())
      }
    }
  }
}

kotlin {
  js {
    outputModuleName = 'portal-published-guest'
    browser()
    binaries.executable()
  }

  sourceSets {
    commonMain {
      dependencies {
        api projects.keliverTreehouse
        api libs.zipline
      }
    }
    jsMain {
      dependencies {
        api projects.keliverTreehouseGuest
        implementation projects.portalDeviceGuest          // HostApi / PortalPresenter interfaces
        implementation projects.webSpikeProtocolGuest      // KeliverMaterialProtocolWidgetSystemFactory
        implementation projects.keliverMaterialCompose
        implementation projects.keliverLayoutCompose
        implementation libs.jetbrains.compose.runtime
        implementation libs.kotlinx.coroutines.core
      }
    }
  }
}
