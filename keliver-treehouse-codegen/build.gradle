// KSP processor that reads @KeliverAppService-annotated interfaces
// from `keliver-treehouse` and emits Generated<Name>Adapter classes
// — the full Zipline #765 manual-adapter workaround, lifted out of
// every adopter's tree. See `docs/KNOWN_BUGS.md` U12 for the
// background and the helper-only API (KeliverAppServiceAdapter,
// keliverReturningFunction) that this processor builds on top of.
//
// Tooling target group — JVM-only, runs at build time. Adopters
// include this as a `ksp(…)` dep on their AppService-defining
// module; nothing from this artifact reaches their runtime classpath.

import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile

import static dev.keliver.buildsupport.TargetGroup.Tooling

redwoodBuild {
  targets(Tooling)
  publishing()
}

apply plugin: 'com.google.devtools.ksp'

dependencies {
  // KSP processor API — provides SymbolProcessor, KSClassDeclaration, etc.
  compileOnly libs.ksp.api

  // KotlinPoet — drives the emitted source layout.
  implementation libs.kotlinPoet
  // KotlinPoet's KSP interop — `KSClassDeclaration.toClassName()`,
  // `KSType.toTypeName()`, `FileSpec.writeTo(codeGenerator, ...)`.
  implementation libs.kotlinPoet.ksp

  // Auto-register the processor via META-INF/services using
  // dev.zacsweers's auto-service-ksp — same pattern as
  // keliver-http-codegen.
  compileOnly libs.autoService.annotations
  ksp libs.autoService.kspCompiler

  testImplementation libs.junit
  testImplementation libs.assertk
  testImplementation libs.kotlinCompileTesting.ksp
  // The compile-testing fixtures reference @KeliverAppService +
  // AppService + KeliverAppServiceAdapter — all live in
  // keliver-treehouse — so it has to be on the test classpath for
  // fixture sources to compile.
  testImplementation projects.keliverTreehouse
  // keliver-treehouse pulls in zipline transitively, but the
  // ziplineServiceSerializer<T>() generated call site resolves
  // against the explicit `app.cash.zipline:zipline` artifact.
  testImplementation libs.zipline
}

tasks.withType(JavaCompile).configureEach {
  sourceCompatibility = JavaVersion.VERSION_11.toString()
  targetCompatibility = JavaVersion.VERSION_11.toString()
}

tasks.withType(KotlinJvmCompile).configureEach {
  compilerOptions {
    jvmTarget.set(JvmTarget.JVM_11)
  }
}
