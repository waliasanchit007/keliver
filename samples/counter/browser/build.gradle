apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

// The name of the final JS file to be referenced from HTML.
base {
  archivesName = 'counter'
}

kotlin {
  js {
    // The name of the JS module which needs to be unique within the repo.
    outputModuleName = 'counter-browser'
    browser()
    binaries.executable()

    compilerOptions {
      target = 'es2015'
    }
  }

  sourceSets {
    commonMain {
      dependencies {
        implementation projects.samples.counter.presenter
        implementation projects.konduitUiBasicDom
        implementation projects.konduitLayoutDom
        implementation projects.konduitLazylayoutDom
        implementation libs.kotlinx.coroutines.core
      }
    }
  }
}
