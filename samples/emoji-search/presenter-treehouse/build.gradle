apply plugin: 'org.jetbrains.kotlin.multiplatform'
apply plugin: 'app.cash.zipline'

redwoodBuild {
  ziplineApplication('emoji-search')
}

kotlin {
  iosArm64()
  iosX64()
  iosSimulatorArm64()

  jvm()

  js {
    // The name of the JS module which needs to be unique within the repo.
    outputModuleName = 'emoji-search-presenter-treehouse'
    browser()
    binaries.executable()
  }

  sourceSets {
    commonMain {
      dependencies {
        api libs.okio
        api projects.konduitTreehouse
      }
    }

    jsMain {
      dependencies {
        api projects.konduitTreehouseGuest
        api projects.samples.emojiSearch.presenter
        implementation projects.samples.emojiSearch.schemaProtocolGuest
      }
    }
  }
}

zipline {
  mainFunction = 'com.example.redwood.emojisearch.treehouse.preparePresenters'
}
