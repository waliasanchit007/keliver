  implementation projects.konduitUiBasicComposeui
  implementation projects.konduitComposeui
  implementation projects.konduitTreehouseHost
  implementation projects.konduitTreehouseHostComposeui
  implementation libs.coil.network.okhttp
  implementation libs.okhttp
  implementation libs.zipline.loader
  implementation libs.kotlinx.coroutines.swing
}
