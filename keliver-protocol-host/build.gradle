import dev.keliver.buildsupport.WasmJs
import static dev.keliver.buildsupport.TargetGroup.Common

redwoodBuild {
  targets(Common + WasmJs.Browser)
  publishing()
}

apply plugin: 'com.github.gmazzo.buildconfig'
apply plugin: 'dev.drewhamilton.poko'

kotlin {
  sourceSets {
    commonMain {
      kotlin.srcDir(redwoodBuild.generateComposeHelpers(tasks, 'dev.keliver.protocol.host'))
      dependencies {
        api projects.keliverProtocol
        api projects.keliverWidget
        api projects.keliverLeakDetector
        implementation libs.jetbrains.compose.collection
      }
    }
    commonTest {
      // Tests depending on the upstream Redwood `test-app` fixture
      // (com.example.redwood.testapp.*) live under appsCommonTest and
      // are OPT-IN behind -PkeliverWithTestApp. The fork removed that
      // fixture (Phase 1.5 strip), so they can't compile by default.
      // Restoring is tracked in docs/KNOWN_BUGS.md U13.
      if (rootProject.hasProperty('keliverWithTestApp')) {
        kotlin.srcDir('src/appsCommonTest/kotlin')
        dependencies {
          implementation projects.testApp.schema.compose
          implementation projects.testApp.schema.testing
          implementation projects.testApp.schema.protocolHost
        }
      }
      dependencies {
        implementation libs.kotlin.test
        implementation libs.assertk
      }
    }
  }
}

buildConfig {
  useKotlinOutput {
    topLevelConstants = true
  }

  className("Version")
  packageName('dev.keliver.protocol.host')
  buildConfigField(
    "dev.keliver.protocol.RedwoodVersion",
    "hostRedwoodVersion",
    "RedwoodVersion(\"${project.version}\")",
  )
}
