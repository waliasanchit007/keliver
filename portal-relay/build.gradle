// spike/keliver-web portal — the local-first PORTAL SERVER (P2/P4). JDK
// HttpServer + files; portal-core (project dep) supplies the tree codec and
// the generated exporter for the publish pipeline. No external deps.
apply plugin: 'org.jetbrains.kotlin.jvm'
apply plugin: 'application'

application {
  mainClass = 'RelayKt'
}

dependencies {
  implementation projects.portalCore
  implementation projects.portalDocument // V2 M1: live document + op engine
  implementation projects.portalIngest   // V2 M3: recognizer + reconciler
  implementation libs.kotlinx.serialization.json // DocJson wire
  implementation 'io.methvin:directory-watcher:0.19.0' // V2 M3: fsevents file-watch (JDK WatchService = 2s polling on macOS)
}
