// Guest-side facade module ‚Äî re-exports the public Konduit API surface
// that every Zipline guest module needs so adopters can depend on a
// single `dev.keliver:konduit-guest` artifact instead of wiring the
// generator + runtime modules manually. See PUBLIC_LAUNCH_ROADMAP.md
// Phase 2.
//
// Targets: JS (TreehouseGuest ‚Äî Kotlin/JS for QuickJS execution, plus
// JVM-for-test). The host-side facade lives in `:konduit-host`.

import static dev.keliver.buildsupport.TargetGroup.TreehouseGuest

redwoodBuild {
  targets(TreehouseGuest)
  publishing()
}

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        // Zipline runtime ‚Äî needed for `ZiplineService` types and host
        // service handles.
        api libs.zipline

        // Compose runtime (@Composable) + widget interfaces. The guest
        // builds widget trees that the host renders.
        api projects.konduitCompose
        api projects.konduitWidget

        // Protocol primitives. `konduit-protocol-guest` is what
        // codegen'd guest factories depend on at runtime.
        api projects.konduitProtocol
        api projects.konduitProtocolGuest

        // The treehouse stack. `konduit-treehouse-guest` provides the
        // entry-point types; `-guest-compose` brings the Compose-aware
        // `Screen` / `Navigator` interfaces guests implement.
        api projects.konduitTreehouse
        api projects.konduitTreehouseGuest
        api projects.konduitTreehouseGuestCompose

        // ViewModel helper ‚Äî `KonduitViewModel` base + `konduitViewModel { }`
        // Compose entry point. See issue #6.
        api projects.konduitVm

        // HTTP shim ‚Äî KonduitHttp typed wrapper + HostHttpProvider
        // ZiplineService interface. Guest calls REST endpoints through
        // a single host-bound service instead of N per-endpoint
        // services. See issue #7.
        api projects.konduitHttp

        // Key/value persistence shim ‚Äî `KonduitStorage` typed wrapper +
        // `HostStorage` ZiplineService interface. See issue #10.
        api projects.konduitStorage

        // Typed navigation ‚Äî `KonduitNavController` + `KonduitNavHost` +
        // `currentKonduitNavController`. Replaces the per-app
        // `HostNavigator` RPC-per-route pattern with a guest-owned typed
        // back stack. See issue #25.
        api projects.konduitNav

        // HTTP API annotations ‚Äî @KonduitApi, @GET, @POST, etc. Phase 1
        // of the Retrofit-style codegen workstream (issue #18). The KSP
        // processor that consumes these is queued for the next dev
        // cycle; the annotations themselves are committed and adopters
        // can start drafting `@KonduitApi` interfaces today.
        api projects.konduitHttpAnnotations
      }
    }
  }
}
