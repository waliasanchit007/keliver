buildscript {
  dependencies {
    classpath "dev.konduit:redwood-gradle-plugin:$redwoodVersion"
    classpath libs.kotlin.gradlePlugin
  }

  repositories {
    maven {
      url "file://${rootDir.absolutePath}/../../../../../build/localMaven"
    }
    mavenCentral()
