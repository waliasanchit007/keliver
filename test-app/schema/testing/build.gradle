import static dev.keliver.buildsupport.TargetGroup.Common

redwoodBuild {
  targets(Common)
}

apply plugin: 'dev.keliver.generator.testing'

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        api projects.keliverUiBasicTesting
        api projects.keliverLayoutTesting
        api projects.keliverLazylayoutTesting
        api projects.testApp.schema.widget
      }
    }
  }

  // Ensure our codegen correctly works in explicit API mode.
  explicitApi()

  targets.configureEach {
    compilations.configureEach {
      kotlinOptions {
        // Ensure our codegen does not produce any warnings.
        allWarningsAsErrors = true

        freeCompilerArgs += [
          // Ensure our codegen can handle the latest language semantics.
          // https://kotlinlang.org/docs/compiler-reference.html#progressive
          '-progressive'
        ]
      }
    }
  }
}

redwoodSchema {
  source = projects.testApp.schema
  type = 'com.example.redwood.testapp.TestSchema'
}
