import dev.konduit.buildsupport.JsTests

import static dev.konduit.buildsupport.TargetGroup.CommonWithAndroid

redwoodBuild {
  targets(CommonWithAndroid + JsTests.Browser)
  publishing()
}

kotlin {
  sourceSets {
    commonMain {
      kotlin.srcDir(redwoodBuild.generateComposeHelpers(tasks, 'dev.konduit.widget'))
      dependencies {
        api libs.kotlinx.coroutines.core
        api projects.konduitRuntime
      }
    }
    commonTest {
      dependencies {
        implementation libs.kotlin.test
        implementation libs.assertk
        implementation projects.konduitSnapshotTesting
        implementation projects.konduitWidgetTesting
      }
    }
    androidMain {
      dependencies {
        implementation libs.androidx.core
        implementation libs.androidx.activity
      }
    }
    androidUnitTest {
      dependencies {
        implementation libs.robolectric
      }
    }
  }
}

android {
  namespace 'dev.konduit.widget'

  buildFeatures {
    // Has default ID for RedwoodLayout.
    androidResources = true
  }
}

spotless {
  kotlin {
    targetExclude(
      // Apache 2-licensed files from AOSP.
      "src/androidMain/kotlin/dev/konduit/widget/SavedStateRegistry.kt",
    )
  }
}
