[versions]
agp = "8.13.2"
android-compileSdk = "36"
android-minSdk = "24"
android-targetSdk = "36"
androidx-activity = "1.10.1"
androidx-core = "1.16.0"
composeMultiplatform = "1.8.2"
# MUST match the Kotlin version that the consumed konduit-* artifacts
# were built with. Mismatches surface at QuickJS load time as
# `IrLinkageError` on the generated `Adapter.<init>` constructor.
# Verify against `konduit/gradle/libs.versions.toml` after every
# Konduit bump.
kotlin = "2.2.0"
# Tracks the latest Konduit pre-release. Adopters point at a fixed
# released version (`1.0.0-caliclan.4` etc.) rather than `-SNAPSHOT`.
konduit = "1.0.0-caliclan.4-SNAPSHOT"
# MUST match the Zipline version in `konduit/gradle/libs.versions.toml`.
zipline = "1.22.0"
okhttp = "4.12.0"

[libraries]
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activity" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidx-core" }
konduit-compose = { module = "dev.konduit:konduit-compose", version.ref = "konduit" }
konduit-widget = { module = "dev.konduit:konduit-widget", version.ref = "konduit" }
konduit-widget-composeui = { module = "dev.konduit:konduit-widget-composeui", version.ref = "konduit" }
konduit-schema = { module = "dev.konduit:konduit-schema", version.ref = "konduit" }
konduit-treehouse = { module = "dev.konduit:konduit-treehouse", version.ref = "konduit" }
konduit-treehouse-guest = { module = "dev.konduit:konduit-treehouse-guest", version.ref = "konduit" }
konduit-treehouse-host = { module = "dev.konduit:konduit-treehouse-host", version.ref = "konduit" }
konduit-treehouse-host-composeui = { module = "dev.konduit:konduit-treehouse-host-composeui", version.ref = "konduit" }
konduit-protocol = { module = "dev.konduit:konduit-protocol", version.ref = "konduit" }
konduit-protocol-host = { module = "dev.konduit:konduit-protocol-host", version.ref = "konduit" }
konduit-protocol-guest = { module = "dev.konduit:konduit-protocol-guest", version.ref = "konduit" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
zipline = { module = "app.cash.zipline:zipline", version.ref = "zipline" }
zipline-loader = { module = "app.cash.zipline:zipline-loader", version.ref = "zipline" }

[plugins]
androidApplication = { id = "com.android.application", version.ref = "agp" }
androidLibrary = { id = "com.android.library", version.ref = "agp" }
composeMultiplatform = { id = "org.jetbrains.compose", version.ref = "composeMultiplatform" }
composeCompiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinAndroid = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlinJvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlinSerialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
konduit-schema = { id = "dev.konduit.schema", version.ref = "konduit" }
konduit-generator-compose = { id = "dev.konduit.generator.compose", version.ref = "konduit" }
konduit-generator-widget = { id = "dev.konduit.generator.widget", version.ref = "konduit" }
konduit-generator-modifiers = { id = "dev.konduit.generator.modifiers", version.ref = "konduit" }
konduit-generator-protocol-host = { id = "dev.konduit.generator.protocol.host", version.ref = "konduit" }
konduit-generator-protocol-guest = { id = "dev.konduit.generator.protocol.guest", version.ref = "konduit" }
zipline = { id = "app.cash.zipline", version.ref = "zipline" }
