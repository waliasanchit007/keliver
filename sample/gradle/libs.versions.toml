[versions]
agp = "8.13.2"
android-compileSdk = "36"
android-minSdk = "24"
android-targetSdk = "36"
androidx-activity = "1.10.1"
androidx-benchmark = "1.3.4"
androidx-core = "1.16.0"
androidx-profileinstaller = "1.4.1"
androidx-test-ext-junit = "1.2.1"
androidx-uiautomator = "2.3.0"
composeMultiplatform = "1.8.2"
ksp = "2.2.0-2.0.2"
# MUST match the Kotlin version that the consumed keliver-* artifacts
# were built with. Mismatches surface at QuickJS load time as
# `IrLinkageError` on the generated `Adapter.<init>` constructor.
# Verify against `keliver/gradle/libs.versions.toml` after every
# Keliver bump.
kotlin = "2.2.0"
# The published public release on Maven Central (no auth required).
# Pin an exact version; see keliver/docs/API_STABILITY.md (pre-1.0).
keliver = "0.1.0"
# MUST match the Zipline version in `keliver/gradle/libs.versions.toml`.
zipline = "1.22.0"
okhttp = "4.12.0"

[libraries]
androidx-activity-compose = { module = "androidx.activity:activity-compose", version.ref = "androidx-activity" }
androidx-benchmark-macro-junit4 = { module = "androidx.benchmark:benchmark-macro-junit4", version.ref = "androidx-benchmark" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidx-core" }
androidx-profileinstaller = { module = "androidx.profileinstaller:profileinstaller", version.ref = "androidx-profileinstaller" }
androidx-test-ext-junit = { module = "androidx.test.ext:junit", version.ref = "androidx-test-ext-junit" }
androidx-test-runner = { module = "androidx.test:runner", version = "1.6.2" }
androidx-uiautomator = { module = "androidx.test.uiautomator:uiautomator", version.ref = "androidx-uiautomator" }
junit = { module = "junit:junit", version = "4.13.2" }
keliver-compose = { module = "dev.keliver:keliver-compose", version.ref = "keliver" }
keliver-widget = { module = "dev.keliver:keliver-widget", version.ref = "keliver" }
keliver-widget-composeui = { module = "dev.keliver:keliver-widget-composeui", version.ref = "keliver" }
keliver-schema = { module = "dev.keliver:keliver-schema", version.ref = "keliver" }
keliver-treehouse = { module = "dev.keliver:keliver-treehouse", version.ref = "keliver" }
keliver-treehouse-guest = { module = "dev.keliver:keliver-treehouse-guest", version.ref = "keliver" }
keliver-treehouse-host = { module = "dev.keliver:keliver-treehouse-host", version.ref = "keliver" }
keliver-treehouse-codegen = { module = "dev.keliver:keliver-treehouse-codegen", version.ref = "keliver" }
keliver-treehouse-host-composeui = { module = "dev.keliver:keliver-treehouse-host-composeui", version.ref = "keliver" }
keliver-protocol = { module = "dev.keliver:keliver-protocol", version.ref = "keliver" }
keliver-protocol-host = { module = "dev.keliver:keliver-protocol-host", version.ref = "keliver" }
keliver-protocol-guest = { module = "dev.keliver:keliver-protocol-guest", version.ref = "keliver" }
keliver-http = { module = "dev.keliver:keliver-http", version.ref = "keliver" }
okhttp = { module = "com.squareup.okhttp3:okhttp", version.ref = "okhttp" }
zipline = { module = "app.cash.zipline:zipline", version.ref = "zipline" }
zipline-loader = { module = "app.cash.zipline:zipline-loader", version.ref = "zipline" }

[plugins]
androidApplication = { id = "com.android.application", version.ref = "agp" }
androidLibrary = { id = "com.android.library", version.ref = "agp" }
androidTest = { id = "com.android.test", version.ref = "agp" }
composeMultiplatform = { id = "org.jetbrains.compose", version.ref = "composeMultiplatform" }
composeCompiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinAndroid = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlinJvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlinMultiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlinSerialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
keliver-schema = { id = "dev.keliver.schema", version.ref = "keliver" }
keliver-generator-compose = { id = "dev.keliver.generator.compose", version.ref = "keliver" }
keliver-generator-widget = { id = "dev.keliver.generator.widget", version.ref = "keliver" }
keliver-generator-modifiers = { id = "dev.keliver.generator.modifiers", version.ref = "keliver" }
keliver-generator-protocol-host = { id = "dev.keliver.generator.protocol.host", version.ref = "keliver" }
keliver-generator-protocol-guest = { id = "dev.keliver.generator.protocol.guest", version.ref = "keliver" }
zipline = { id = "app.cash.zipline", version.ref = "zipline" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
