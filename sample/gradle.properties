# Match the root Konduit project's daemon settings so AGP doesn't OOM
# on the first build. 2 GB is overkill for the sample's size, but
# matches the konduit-root settings adopters are likely copying.
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin / Android conveniences.
kotlin.code.style=official
android.useAndroidX=true
android.nonTransitiveRClass=true

# Konduit Maven repo auth — uncomment + fill these in locally, OR set
# the GITHUB_ACTOR / GITHUB_TOKEN env vars. Token needs `read:packages`.
# See sample/README.md for the full setup.
# gpr.user=your-github-username
# gpr.token=ghp_xxxxxxxxxxxxxxxxxxxx
