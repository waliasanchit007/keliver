# Match the root Keliver project's daemon settings so AGP doesn't OOM
# on the first build. 2 GB is overkill for the sample's size, but
# matches the keliver-root settings adopters are likely copying.
org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Kotlin / Android conveniences.
kotlin.code.style=official
android.useAndroidX=true
android.nonTransitiveRClass=true
