import static dev.keliver.buildsupport.TargetGroup.TreehouseHost

redwoodBuild {
  targets(TreehouseHost)
  publishing()
}

apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'app.cash.zipline'

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        api libs.kotlinx.coroutines.core
        api libs.kotlinx.serialization.json
        api libs.okio
        api libs.zipline
        api libs.zipline.loader
        api projects.konduitProtocol
        api projects.konduitProtocolHost
        api projects.konduitTreehouse
      }
    }

    androidMain {
      dependencies {
        api libs.okhttp
        implementation libs.androidx.activity
      }
    }

    commonTest {
      dependencies {
        implementation libs.assertk
        implementation libs.kotlin.test
        implementation libs.kotlinx.coroutines.test
        implementation libs.okio
        implementation libs.turbine
        implementation libs.jetbrains.compose.collection
        implementation projects.konduitLayoutTesting
        implementation projects.konduitLazylayoutTesting
        implementation projects.konduitWidget
      }
    }
    androidUnitTest {
      dependencies {
        implementation libs.robolectric
      }
    }
    jvmTest {
      // The `appsJvmTest` source set holds integration tests that load a
      // real Zipline guest bundle via TreehouseTester (GuestLifecycleTest,
      // LeaksTest, etc.). They depend on the upstream Redwood `test-app`
      // fixture, which this fork removed during the Phase 1.5 strip — so
      // they're OPT-IN behind `-PkonduitWithTestApp`, not default. Without
      // the fixture they can't compile. Restoring them is tracked as a
      // follow-up (port test-app / repoint at sample/guest). See
      // docs/KNOWN_BUGS.md U13.
      if (rootProject.hasProperty('konduitWithTestApp')) {
        kotlin.srcDir('src/appsJvmTest/kotlin')
        dependencies {
          implementation projects.testApp.schema.protocolHost
          implementation projects.testApp.schema.testing
          implementation projects.testApp.schema.widget
          implementation projects.testApp.presenterTreehouse
        }
      }
    }
  }
}

dependencies {
  androidTestImplementation libs.junit
  androidTestImplementation libs.turbine
  androidTestImplementation libs.androidx.test.runner
  androidTestImplementation libs.kotlinx.coroutines.test
  androidTestImplementation libs.assertk
  androidTestImplementation projects.konduitLayoutTesting
  androidTestImplementation projects.konduitLazylayoutTesting

  // The kotlin.test library provides JVM variants for multiple testing frameworks. The Kotlin
  // plugin does not apply the capability to configurations created by the Android plugin.
  androidTestImplementation libs.kotlin.test.junit
}

android {
  namespace 'app.cash.treehouse.host'

  sourceSets {
    androidTest {
      java.srcDir('src/commonTest/kotlin')
    }
  }

  defaultConfig {
    testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
  }

  buildFeatures {
    // Needed for unit tests which use ViewCompat whose static fields reference `R.id`s.
    androidResources = true
  }
}

// TreehouseTester loads a real guest bundle from the upstream Redwood
// `test-app` fixture. That module isn't part of this fork, so the
// dependency is wired ONLY when the integration tests are explicitly
// opted in via `-PkonduitWithTestApp` (paired with the appsJvmTest
// srcDir above). On a default `./gradlew test` this stays off, so the
// build no longer fails resolving a non-existent task. See U13.
if (rootProject.hasProperty('konduitWithTestApp')) {
  tasks.withType(Test.class).configureEach {
    it.dependsOn(":test-app:presenter-treehouse:compileDevelopmentExecutableKotlinJsZipline")
  }
}
