import static dev.konduit.buildsupport.TargetGroup.ToolkitAndroid

redwoodBuild {
  targets(ToolkitAndroid)
  publishing()
}

apply plugin: 'org.jetbrains.kotlin.plugin.serialization'
apply plugin: 'app.cash.burst'
apply plugin: 'app.cash.paparazzi'

dependencies {
  api projects.konduitLazylayoutWidget
  implementation libs.androidx.core
  implementation libs.androidx.recyclerview
  implementation libs.androidx.swipeRefreshLayout
  implementation libs.kotlinx.coroutines.android
  testImplementation libs.burst
  testImplementation projects.konduitLayoutSharedTest
  testImplementation projects.konduitLazylayoutSharedTest
  testImplementation projects.konduitLayoutView
  testImplementation projects.konduitSnapshotTesting
}

android {
  namespace 'dev.konduit.lazylayout.view'

  buildFeatures {
    // For Paparazzi, which internally uses resources to set itself up.
    androidResources = true
  }
}
