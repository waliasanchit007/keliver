// spike/keliver-web: guest-side protocol widget-system factory for
// keliver-material, generated for the web (Wasm) target. Produces
// dev.keliver.material.protocol.guest.KeliverMaterialProtocolWidgetSystemFactory.
import static dev.keliver.buildsupport.TargetGroup.Common

redwoodBuild {
  targets(Common)
}

apply plugin: 'dev.keliver.generator.protocol.guest'

kotlin {
  sourceSets {
    commonMain {
      dependencies {
        api projects.keliverMaterialWidget
        implementation projects.keliverProtocolGuest
      }
    }
  }
}

redwoodSchema {
  source = projects.keliverMaterialSchema
  type = 'dev.keliver.material.KeliverMaterial'
}
