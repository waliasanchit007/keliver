import static dev.konduit.buildsupport.TargetGroup.Common

redwoodBuild {
  targets(Common)
  publishing()
}

apply plugin: 'org.jetbrains.kotlin.plugin.compose'
apply plugin: 'com.github.gmazzo.buildconfig'

kotlin {
  sourceSets {
    commonMain {
      kotlin.srcDir(redwoodBuild.generateComposeHelpers(tasks, 'dev.konduit.protocol.guest'))
      dependencies {
        api projects.konduitProtocol
        api projects.konduitCompose
      }
    }
    commonTest {
      // testapp-fixture-dependent tests are opt-in — see U13 / the
      // matching comment in konduit-protocol-host/build.gradle.
      if (rootProject.hasProperty('konduitWithTestApp')) {
        kotlin.srcDir('src/appsCommonTest/kotlin')
        dependencies {
          implementation projects.testApp.schema.compose
          implementation projects.testApp.schema.protocolGuest
        }
      }
      dependencies {
        implementation libs.kotlin.test
        implementation libs.assertk
        implementation libs.kotlinx.coroutines.test
        implementation projects.konduitLazylayoutCompose
        implementation projects.konduitTesting
      }
    }
  }
}

buildConfig {
  useKotlinOutput {
    topLevelConstants = true
  }

  className("Version")
  packageName('dev.konduit.protocol.guest')
  buildConfigField(
    "dev.konduit.protocol.RedwoodVersion",
    "guestRedwoodVersion",
    "RedwoodVersion(\"${project.version}\")",
  )
}
